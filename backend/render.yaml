# render.yaml — place this in your /backend folder when deploying to Render
# Render will auto-detect this file and configure the service.

services:
  - type: web
    name: cdrrmo-fews-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
